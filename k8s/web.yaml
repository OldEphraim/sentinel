apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-web
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-web
  template:
    metadata:
      labels:
        app: sentinel-web
    spec:
      containers:
        - name: web
          image: gcr.io/YOUR_PROJECT/sentinel-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://sentinel-api:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-web
  namespace: sentinel
spec:
  type: LoadBalancer
  selector:
    app: sentinel-web
  ports:
    - port: 80
      targetPort: 3000
