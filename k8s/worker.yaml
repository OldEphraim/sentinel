apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-worker
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-worker
  template:
    metadata:
      labels:
        app: sentinel-worker
    spec:
      containers:
        - name: worker
          image: gcr.io/YOUR_PROJECT/sentinel-worker:latest
          envFrom:
            - secretRef:
                name: sentinel-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
