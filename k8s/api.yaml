apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
  namespace: sentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-api
  template:
    metadata:
      labels:
        app: sentinel-api
    spec:
      containers:
        - name: api
          image: gcr.io/YOUR_PROJECT/sentinel-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinel-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-api
  namespace: sentinel
spec:
  selector:
    app: sentinel-api
  ports:
    - port: 8000
      targetPort: 8000
