apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
  namespace: {{ .Release.Namespace | default "sentinel" }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app: sentinel-api
  template:
    metadata:
      labels:
        app: sentinel-api
    spec:
      containers:
        - name: api
          image: {{ .Values.image.registry }}/sentinel-api:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinel-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.resources.api.requests.cpu }}
              memory: {{ .Values.resources.api.requests.memory }}
            limits:
              cpu: {{ .Values.resources.api.limits.cpu }}
              memory: {{ .Values.resources.api.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-api
  namespace: {{ .Release.Namespace | default "sentinel" }}
spec:
  selector:
    app: sentinel-api
  ports:
    - port: 8000
      targetPort: 8000
